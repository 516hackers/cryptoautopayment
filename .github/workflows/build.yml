name: Build — EXE + Installer

on:
  push:
    branches: [ main ]
    paths:
      - "main.py"
      - "requirements.txt"
      - "installer.iss"
      - ".github/workflows/build.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --name InfinityMetaHub `
            --copy-metadata py_ecc `
            --copy-metadata web3 `
            --copy-metadata eth-account `
            --copy-metadata eth-keyfile `
            --copy-metadata eth-keys `
            --copy-metadata eth-utils `
            --copy-metadata eth-typing `
            --copy-metadata eth-abi `
            --copy-metadata eth-rlp `
            --copy-metadata hexbytes `
            --copy-metadata rlp `
            --copy-metadata pycryptodome `
            main.py

      - name: Verify EXE was created
        run: |
          if (!(Test-Path "dist\InfinityMetaHub.exe")) {
            Write-Error "EXE not found!"
            exit 1
          }
          $size = (Get-Item "dist\InfinityMetaHub.exe").length / 1MB
          Write-Host "EXE size: $([math]::Round($size,1)) MB"

      - name: Install Inno Setup 6 (skips if already present)
        run: choco install innosetup -y --no-progress --ignore-checksums

      - name: Create installer output directory
        run: mkdir dist_installer

      - name: Prepare wizard images (ayamil.jpg → BMP)
        run: |
          $pythonScript = @"
          import sys
          from pathlib import Path

          try:
              from PIL import Image

              src = Path("ayamil.jpg")
              if not src.exists():
                  raise FileNotFoundError(f"{src} not found in repo root")

              print(f"Opening {src}...")
              img = Image.open(src).convert("RGBA")
              print(f"  Source: {img.size[0]}x{img.size[1]} {img.mode}")

              # Brand blue matching the Ayamil Coders logo background
              BG_BLUE = (30, 90, 200)

              # ── Banner: 164x314 (Inno Setup left-panel wizard image) ──────────
              W, H = 164, 314
              banner = Image.new("RGB", (W, H), BG_BLUE)
              logo_w = W - 10          # 5px padding each side
              logo_h = logo_w          # keep square aspect ratio
              logo_top = (H - logo_h) // 2
              logo_resized = img.resize((logo_w, logo_h), Image.LANCZOS)
              banner.paste(logo_resized, (5, logo_top), logo_resized)
              banner.save("ayamil_banner.bmp", format="BMP")
              print(f"  Created ayamil_banner.bmp (164x314) - logo centred on blue bg")

              # ── Small image: 55x58 (Inno Setup top-right corner) ─────────────
              small_bg = Image.new("RGB", (55, 58), BG_BLUE)
              logo_small = img.resize((48, 48), Image.LANCZOS)
              small_bg.paste(logo_small, (3, 5), logo_small)
              small_bg.save("ayamil_small.bmp", format="BMP")
              print(f"  Created ayamil_small.bmp (55x58)")

              print("Done - Ayamil Coders logo embedded in both installer images.")

          except Exception as e:
              print(f"ERROR: {e}", file=sys.stderr)
              print("Falling back to solid blue placeholders...", file=sys.stderr)
              try:
                  from PIL import Image
                  Image.new("RGB", (164, 314), color=(30, 90, 200)).save("ayamil_banner.bmp", "BMP")
                  Image.new("RGB", (55, 58),   color=(30, 90, 200)).save("ayamil_small.bmp",  "BMP")
                  print("Fallback BMPs created.", file=sys.stderr)
              except Exception as fe:
                  print(f"FATAL: {fe}", file=sys.stderr)
                  sys.exit(1)
          "@

          $pythonScript | python -

      - name: Verify banner images were created
        run: |
          if (!(Test-Path "ayamil_banner.bmp")) {
            Write-Error "ayamil_banner.bmp not found!"
            exit 1
          }
          if (!(Test-Path "ayamil_small.bmp")) {
            Write-Error "ayamil_small.bmp not found!"
            exit 1
          }
          $b = (Get-Item "ayamil_banner.bmp").length / 1KB
          $s = (Get-Item "ayamil_small.bmp").length / 1KB
          Write-Host "ayamil_banner.bmp: $([math]::Round($b,1)) KB"
          Write-Host "ayamil_small.bmp:  $([math]::Round($s,1)) KB"

      - name: Build Installer with Inno Setup
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify installer was created
        run: |
          $installer = Get-ChildItem "dist_installer\*.exe" | Select-Object -First 1
          if (!$installer) { Write-Error "Installer not found!"; exit 1 }
          $size = $installer.Length / 1MB
          Write-Host "Installer: $($installer.Name)  ($([math]::Round($size,1)) MB)"

      - name: Upload standalone EXE
        uses: actions/upload-artifact@v4
        with:
          name: InfinityMetaHub-EXE-only
          path: dist\InfinityMetaHub.exe

      - name: Upload Windows Installer (Setup)
        uses: actions/upload-artifact@v4
        with:
          name: InfinityMetaHub-Setup-Installer
          path: dist_installer\*.exe
