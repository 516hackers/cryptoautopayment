name: Build — EXE + Installer v4.0.0

on:
  push:
    branches: [ main ]
    paths:
      - "main.py"
      - "requirements.txt"
      - "installer.iss"
      - "imh.png"
      - "ayamil.jpg"
      - ".github/workflows/build.yml"
  workflow_dispatch:

env:
  APP_VERSION: "4.0.0"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required assets
        run: |
          foreach ($f in @("ayamil.jpg", "imh.png")) {
            if (!(Test-Path $f)) {
              Write-Error "Required asset '$f' not found!"
              exit 1
            }
          }
          Write-Host "All required assets found."

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Convert PNG to ICO
        run: |
          python -c "
          from PIL import Image
          img = Image.open('imh.png')
          img.save('imh.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])
          print('SUCCESS: Created imh.ico')
          "

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --noconsole --name InfinityMetaHub `
            --icon imh.ico `
            --add-data "imh.png;." `
            --add-data "ayamil.jpg;." `
            --copy-metadata py_ecc --copy-metadata web3 --copy-metadata eth-account `
            --copy-metadata eth-keyfile --copy-metadata eth-keys --copy-metadata eth-utils `
            --copy-metadata eth-typing --copy-metadata eth-abi --copy-metadata eth-rlp `
            --copy-metadata hexbytes --copy-metadata rlp --copy-metadata pycryptodome `
            main.py

      - name: Verify EXE
        run: |
          if (!(Test-Path "dist\InfinityMetaHub.exe")) { Write-Error "EXE not found!"; exit 1 }
          $size = (Get-Item "dist\InfinityMetaHub.exe").length / 1MB
          Write-Host "SUCCESS: EXE created! Size: $([math]::Round($size,1)) MB"

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress --ignore-checksums

      - name: Prepare wizard images
        run: |
          python -c "
          from PIL import Image
          from pathlib import Path
          src = Path('ayamil.jpg')
          img = Image.open(src).convert('RGBA')
          BG = (30, 90, 200)
          # Banner
          banner = Image.new('RGB', (164, 314), BG)
          logo = img.resize((154, 154), Image.Resampling.LANCZOS)
          banner.paste(logo, (5, 80), logo)
          banner.save('ayamil_banner.bmp')
          # Small
          small = Image.new('RGB', (55, 58), BG)
          s_logo = img.resize((48, 48), Image.Resampling.LANCZOS)
          small.paste(s_logo, (3, 5), s_logo)
          small.save('ayamil_small.bmp')
          print('SUCCESS: Wizard images created')
          "

      - name: Build Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Rename artifacts
        run: |
          Rename-Item "dist\InfinityMetaHub.exe" "dist\InfinityMetaHub_v${{ env.APP_VERSION }}.exe"

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: InfinityMetaHub-v${{ env.APP_VERSION }}-EXE-only
          path: dist\InfinityMetaHub_v${{ env.APP_VERSION }}.exe

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: InfinityMetaHub-v${{ env.APP_VERSION }}-Setup-Installer
          path: dist_installer\InfinityMetaHub_Setup_v${{ env.APP_VERSION }}.exe

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: "Infinity Meta Hub v${{ env.APP_VERSION }}"
          body: |
            ## Infinity Meta Hub v${{ env.APP_VERSION }}
            **Build:** ${{ github.sha }}
            ### Downloads
            - `InfinityMetaHub_Setup_v${{ env.APP_VERSION }}.exe` (Recommended)
            - `InfinityMetaHub_v${{ env.APP_VERSION }}.exe`
          files: |
            dist\InfinityMetaHub_v${{ env.APP_VERSION }}.exe
            dist_installer\InfinityMetaHub_Setup_v${{ env.APP_VERSION }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
