name: Build — EXE + Installer

on:
  push:
    branches: [ main ]
    paths:
      - "main.py"
      - "requirements.txt"
      - "installer.iss"
      - ".github/workflows/build.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --name InfinityMetaHub `
            --copy-metadata py_ecc `
            --copy-metadata web3 `
            --copy-metadata eth-account `
            --copy-metadata eth-keyfile `
            --copy-metadata eth-keys `
            --copy-metadata eth-utils `
            --copy-metadata eth-typing `
            --copy-metadata eth-abi `
            --copy-metadata eth-rlp `
            --copy-metadata hexbytes `
            --copy-metadata rlp `
            --copy-metadata pycryptodome `
            main.py

      - name: Verify EXE was created
        run: |
          if (!(Test-Path "dist\InfinityMetaHub.exe")) {
            Write-Error "EXE not found!"
            exit 1
          }
          $size = (Get-Item "dist\InfinityMetaHub.exe").length / 1MB
          Write-Host "EXE size: $([math]::Round($size,1)) MB"

      - name: Install Inno Setup 6 (skips if already present)
        run: choco install innosetup -y --no-progress --ignore-checksums

      - name: Create installer output directory
        run: mkdir dist_installer

      - name: Prepare wizard image (convert ayamil.jpg → ayamil.bmp via Python/Pillow)
        run: |
          python - << 'PYEOF'
          import sys
          from pathlib import Path
          try:
              from PIL import Image
              src = Path("ayamil.jpg")
              if src.exists():
                  img = Image.open(src).convert("RGB")
                  # Inno Setup wizard image: 164x314 (tall banner, left side)
                  # WizardSmallImageFile: 55x58
                  # Resize to exactly 164x314 for the main banner
                  banner = img.resize((164, 314), Image.LANCZOS)
                  banner.save("ayamil_banner.bmp", format="BMP")
                  # Small image 55x58
                  small = img.resize((55, 58), Image.LANCZOS)
                  small.save("ayamil_small.bmp", format="BMP")
                  print("Converted ayamil.jpg -> ayamil_banner.bmp + ayamil_small.bmp")
              else:
                  raise FileNotFoundError("ayamil.jpg not found")
          except Exception as e:
              print(f"WARNING: Could not convert image: {e}")
              print("Generating fallback solid-colour BMP placeholders...")
              # Create minimal valid BMP placeholders (green brand colour)
              from PIL import Image as PILImage
              PILImage.new("RGB", (164, 314), color=(26, 126, 35)).save("ayamil_banner.bmp", "BMP")
              PILImage.new("RGB", (55, 58),   color=(26, 126, 35)).save("ayamil_small.bmp",  "BMP")
              print("Fallback BMPs created.")
          PYEOF

      - name: Build Installer with Inno Setup
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify installer was created
        run: |
          $installer = Get-ChildItem "dist_installer\*.exe" | Select-Object -First 1
          if (!$installer) { Write-Error "Installer not found!"; exit 1 }
          $size = $installer.Length / 1MB
          Write-Host "Installer: $($installer.Name)  ($([math]::Round($size,1)) MB)"

      - name: Upload standalone EXE
        uses: actions/upload-artifact@v4
        with:
          name: InfinityMetaHub-EXE-only
          path: dist\InfinityMetaHub.exe

      - name: Upload Windows Installer (Setup)
        uses: actions/upload-artifact@v4
        with:
          name: InfinityMetaHub-Setup-Installer
          path: dist_installer\*.exe
