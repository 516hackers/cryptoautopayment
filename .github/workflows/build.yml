name: Build — EXE + Installer  v4.0

on:
  push:
    branches: [ main ]
    paths:
      - "main.py"
      - "requirements.txt"
      - "installer.iss"
      - "imh.png"
      - "ayamil.jpg"
      - ".github/workflows/build.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Verify required assets ────────────────────────────────────
      - name: Verify required assets
        run: |
          $missing = @()
          foreach ($f in @("ayamil.jpg", "main.py", "requirements.txt", "installer.iss")) {
            if (!(Test-Path $f)) { $missing += $f }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing required files: $($missing -join ', ')"
            exit 1
          }
          Write-Host "All required files present."

          # imh.png is optional (for custom icon)
          if (Test-Path "imh.png") {
            Write-Host "imh.png found — will use as app icon."
          } else {
            Write-Warning "imh.png not found — EXE will use default Python icon."
          }

      # ── 3. Python setup ──────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      # ── 4. Convert imh.png to .ico (optional, skipped if missing) ────
      - name: Convert imh.png to ICO
        run: |
          if (Test-Path "imh.png") {
            python -c "
          from PIL import Image
          img = Image.open('imh.png')
          img.save('imh.ico', format='ICO',
                   sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])
          print('Created imh.ico')
          "
          } else {
            Write-Warning "imh.png not found — skipping ICO generation."
          }

      # ── 5. Build EXE ─────────────────────────────────────────────────
      - name: Build EXE with PyInstaller
        run: |
          $args = @(
            "--onefile",
            "--noconsole",
            "--name", "InfinityMetaHub",
            "--copy-metadata", "py_ecc",
            "--copy-metadata", "web3",
            "--copy-metadata", "eth-account",
            "--copy-metadata", "eth-keyfile",
            "--copy-metadata", "eth-keys",
            "--copy-metadata", "eth-utils",
            "--copy-metadata", "eth-typing",
            "--copy-metadata", "eth-abi",
            "--copy-metadata", "eth-rlp",
            "--copy-metadata", "hexbytes",
            "--copy-metadata", "rlp",
            "--copy-metadata", "pycryptodome"
          )

          if (Test-Path "imh.ico") {
            $args += "--icon"
            $args += "imh.ico"
          }
          if (Test-Path "imh.png") {
            $args += "--add-data"
            $args += "imh.png;."
          }
          if (Test-Path "ayamil.jpg") {
            $args += "--add-data"
            $args += "ayamil.jpg;."
          }

          $args += "main.py"
          pyinstaller @args

      - name: Verify EXE
        run: |
          if (!(Test-Path "dist\InfinityMetaHub.exe")) {
            Write-Error "EXE not found after build!"
            exit 1
          }
          $mb = [math]::Round((Get-Item "dist\InfinityMetaHub.exe").Length / 1MB, 1)
          Write-Host "EXE created: $mb MB"

      # ── 6. Inno Setup ────────────────────────────────────────────────
      - name: Install / confirm Inno Setup 6
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (Test-Path $iscc) {
            Write-Host "Inno Setup already present at $iscc"
          } else {
            choco install innosetup -y --no-progress
          }

      - name: Create installer output directory
        run: New-Item -ItemType Directory -Force -Path dist_installer | Out-Null

      # ── 7. Convert ayamil.jpg → BMP wizard images ────────────────────
      - name: Prepare wizard images
        run: |
          python - << 'PYEOF'
          from PIL import Image
          from pathlib import Path
          import sys

          src = Path("ayamil.jpg")
          if not src.exists():
              print("ERROR: ayamil.jpg not found", file=sys.stderr)
              sys.exit(1)

          img = Image.open(src).convert("RGBA")
          BG  = (26, 35, 126)   # #1A237E — matching the app footer colour

          # Banner: 164 x 314  (Inno Setup left-side image)
          W, H = 164, 314
          banner = Image.new("RGB", (W, H), BG)
          logo_size = W - 10
          logo = img.resize((logo_size, logo_size), Image.Resampling.LANCZOS)
          banner.paste(logo, (5, (H - logo_size) // 2), logo)
          banner.save("ayamil_banner.bmp", format="BMP")
          print("Created ayamil_banner.bmp (164x314)")

          # Small: 55 x 58  (Inno Setup top-right corner)
          small_bg  = Image.new("RGB", (55, 58), BG)
          small_img = img.resize((48, 48), Image.Resampling.LANCZOS)
          small_bg.paste(small_img, (3, 5), small_img)
          small_bg.save("ayamil_small.bmp", format="BMP")
          print("Created ayamil_small.bmp (55x58)")
          PYEOF

      # ── 8. Copy icon for installer to reference ───────────────────────
      - name: Copy ICO for installer
        run: |
          if (Test-Path "imh.ico") {
            Copy-Item "imh.ico" "dist_installer\imh.ico" -Force
          } else {
            # Create a minimal placeholder so installer.iss doesn't error
            Write-Warning "imh.ico not found — creating placeholder"
            python -c "
          from PIL import Image
          img = Image.new('RGB', (16, 16), (26, 35, 126))
          img.save('imh.ico', format='ICO')
          "
          }

      # ── 9. Build installer ────────────────────────────────────────────
      - name: Build installer with Inno Setup
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          Write-Host "Running: $iscc installer.iss"
          & $iscc installer.iss
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Inno Setup build failed (exit $LASTEXITCODE)"
            exit $LASTEXITCODE
          }

      - name: Verify installer output
        run: |
          $exe = Get-ChildItem "dist_installer\InfinityMetaHub_Setup_*.exe" |
                 Select-Object -First 1
          if (!$exe) {
            Write-Error "Installer EXE not found in dist_installer\"
            exit 1
          }
          $mb = [math]::Round($exe.Length / 1MB, 1)
          Write-Host "Installer: $($exe.Name)  ($mb MB)"

      # ── 10. Upload artifacts ─────────────────────────────────────────
      - name: Upload standalone EXE
        uses: actions/upload-artifact@v4
        with:
          name: InfinityMetaHub-v4.0-EXE
          path: dist\InfinityMetaHub.exe

      - name: Upload Windows Setup Installer
        uses: actions/upload-artifact@v4
        with:
          name: InfinityMetaHub-v4.0-Setup
          path: dist_installer\InfinityMetaHub_Setup_*.exe
